<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Bot Dashboard</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10;
    --bg2: #18181b;
    --bg3: #1f1f23;
    --border: #2a2a2e;
    --text: #efeff1;
    --muted: #adadb8;
    --purple: #9147ff;
    --green: #00c853;
    --red: #e53935;
    --yellow: #ffb300;
    --radius: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
  
  .layout { display: grid; grid-template-columns: 260px 1fr 280px; grid-template-rows: 48px 1fr; height: 100vh; gap: 0; }
  
  /* Header */
  .topbar { grid-column: 1/-1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; color: var(--purple); }
  .live-badge { background: var(--red); color: white; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; }
  .channel-name { font-weight: 600; }
  .game-name { color: var(--muted); font-size: 13px; margin-left: auto; }
  .viewers { color: var(--muted); font-size: 13px; margin-left: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: 12px; box-shadow: 0 0 6px var(--green); }
  
  /* Left panel */
  .left { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; gap: 1px; }
  .panel { background: var(--bg2); }
  .panel-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 14px 6px; }
  
  /* Bots */
  .bot-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .bot-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .bot-avatar.off { background: var(--bg3); color: var(--muted); }
  .bot-info { flex: 1; min-width: 0; }
  .bot-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bot-status { font-size: 11px; color: var(--muted); }
  .bot-status.online { color: var(--green); }
  .toggle { position: relative; width: 34px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 18px; transition: .2s; }
  .slider::before { content: ''; position: absolute; height: 12px; width: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--purple); }
  input:checked + .slider::before { transform: translateX(16px); }
  
  /* Phrase groups */
  .phrase-section { padding: 8px 14px 12px; border-bottom: 1px solid var(--border); }
  .phrase-group-name { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .phrase-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .phrase-tag { font-size: 12px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text); transition: all .15s; white-space: nowrap; }
  .phrase-tag:hover { background: var(--purple); border-color: var(--purple); color: white; }
  .add-tag { font-size: 12px; padding: 4px 10px; background: transparent; border: 1px dashed var(--border); border-radius: 20px; cursor: pointer; color: var(--muted); }
  .add-tag:hover { border-color: var(--purple); color: var(--purple); }
  
  /* Center chat */
  .center { display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; gap: 8px; align-items: flex-start; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg-av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-top: 1px; }
  .msg-av.bot { background: var(--purple); }
  .msg-av.user { background: #2a6b9c; }
  .msg-av.streamer { background: #c27c0e; }
  .msg-av.system { background: var(--bg3); }
  .msg-body { flex: 1; }
  .msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1px; }
  .msg-name { font-size: 12px; font-weight: 700; }
  .msg-name.bot { color: var(--purple); }
  .msg-name.user { color: #5ba3d9; }
  .msg-name.streamer { color: #f0a500; }
  .msg-name.system { color: var(--muted); }
  .msg-time { font-size: 10px; color: var(--muted); }
  .msg-text { font-size: 13px; color: var(--text); line-height: 1.4; }
  .msg-actions { margin-top: 3px; display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-btn { font-size: 11px; padding: 2px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--muted); }
  .msg-btn:hover { color: var(--text); border-color: var(--muted); }
  
  /* Send area */
  .send-area { border-top: 1px solid var(--border); padding: 10px 14px; background: var(--bg2); }
  .reply-bar { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: var(--bg3); border-left: 2px solid var(--purple); border-radius: 0 4px 4px 0; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
  .reply-bar.hidden { display: none; }
  .reply-x { cursor: pointer; margin-left: auto; color: var(--muted); font-size: 14px; }
  .reply-x:hover { color: var(--text); }
  .send-row { display: flex; gap: 8px; }
  select.bot-pick { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 0 10px; font-size: 13px; cursor: pointer; flex-shrink: 0; height: 36px; }
  .msg-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 0 12px; font-size: 13px; height: 36px; outline: none; }
  .msg-inp:focus { border-color: var(--purple); }
  .send-btn { background: var(--purple); border: none; border-radius: var(--radius); color: white; padding: 0 18px; font-size: 13px; font-weight: 600; cursor: pointer; height: 36px; white-space: nowrap; }
  .send-btn:hover { background: #7c3bda; }
  
  /* Right panel */
  .right { background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .transcript-area { padding: 10px 14px; flex: 1; }
  .transcript-item { padding: 8px 10px; background: var(--bg3); border-radius: var(--radius); margin-bottom: 6px; font-size: 12px; line-height: 1.5; color: var(--text); border-left: 2px solid var(--purple); }
  .transcript-time { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .no-transcript { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }
  
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.hidden { display: none; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 320px; }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 12px; font-size: 13px; margin-bottom: 8px; outline: none; }
  .modal input:focus { border-color: var(--purple); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-btn { padding: 7px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .modal-btn.cancel { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .modal-btn.ok { background: var(--purple); color: white; }
</style>
</head>
<body>
<div class="layout">

  <!-- Topbar -->
  <div class="topbar">
    <span class="logo">⬡ BOT DASHBOARD</span>
    <span class="live-badge" id="live-badge">ОФЛАЙН</span>
    <span class="channel-name" id="channel-name">загрузка...</span>
    <span class="game-name" id="game-name"></span>
    <span class="viewers" id="viewers"></span>
    <span class="status-dot" id="status-dot" style="background:var(--muted);box-shadow:none"></span>
  </div>

  <!-- Left panel -->
  <div class="left">
    <div class="panel">
      <div class="panel-title">Боты</div>
      <div id="bot-list"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Быстрые фразы</div>
      <div id="phrase-list"></div>
    </div>
  </div>

  <!-- Center chat -->
  <div class="center">
    <div class="chat-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      ЧАТ
      <span style="color:var(--muted);font-weight:400;margin-left:auto" id="msg-count">0 сообщений</span>
    </div>
    <div class="chat-messages" id="chat"></div>
    <div class="send-area">
      <div class="reply-bar hidden" id="reply-bar">
        <span id="reply-label">Ответ для @...</span>
        <span class="reply-x" onclick="clearReply()">✕</span>
      </div>
      <div class="send-row">
        <select class="bot-pick" id="bot-select"></select>
        <input class="msg-inp" id="msg-inp" placeholder="Написать в чат от имени бота..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">Отправить</button>
      </div>
    </div>
  </div>

  <!-- Right panel - transcriptions -->
  <div class="right">
    <div class="panel-title" style="padding:12px 14px 6px">Транскрипция стрима</div>
    <div class="transcript-area" id="transcript-area">
      <div class="no-transcript" id="no-transcript">Ожидание аудио...<br><small style="font-size:11px;opacity:.6">Появится когда ты начнёшь говорить</small></div>
    </div>
  </div>
</div>

<!-- Modal для добавления фразы -->
<div class="modal-bg hidden" id="modal">
  <div class="modal">
    <h3>Добавить фразу</h3>
    <input id="modal-group" placeholder="Группа (напр: Приветствия)" />
    <input id="modal-phrase" placeholder="Текст фразы" />
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Отмена</button>
      <button class="modal-btn ok" onclick="addPhrase()">Добавить</button>
    </div>
  </div>
</div>

<script>
const socket = io();
let replyTo = null;
let botList = [];
let msgCount = 0;
let pendingGroup = '';

// Загрузка статуса
async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    renderBots(data.bots);
    renderPhrases(data.phraseGroups);
    updateHeader(data.channelInfo);
    // Populate bot select
    const sel = document.getElementById('bot-select');
    sel.innerHTML = data.bots.map((b, i) => `<option value="${i}">${b.username}</option>`).join('');
    botList = data.bots;
    document.getElementById('channel-name').textContent = process.env.TWITCH_CHANNEL || data.channelInfo?.title || '';
  } catch(e) { console.error(e); }
}

function updateHeader(info) {
  if (!info) return;
  document.getElementById('channel-name').textContent = info.title || '';
  document.getElementById('game-name').textContent = info.gameName ? '🎮 ' + info.gameName : '';
  document.getElementById('viewers').textContent = info.viewerCount ? '👁 ' + info.viewerCount : '';
  if (info.isLive) {
    document.getElementById('live-badge').textContent = 'LIVE';
    document.getElementById('live-badge').style.background = 'var(--red)';
    document.getElementById('status-dot').style.background = 'var(--green)';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--green)';
  }
}

function renderBots(bots) {
  const el = document.getElementById('bot-list');
  el.innerHTML = bots.map((b, i) => `
    <div class="bot-item">
      <div class="bot-avatar ${b.enabled ? '' : 'off'}" id="av-${i}">${b.username.slice(0,2).toUpperCase()}</div>
      <div class="bot-info">
        <div class="bot-name">${b.username}</div>
        <div class="bot-status ${b.connected && b.enabled ? 'online' : ''}" id="bst-${i}">${b.connected && b.enabled ? 'онлайн' : 'выключен'}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${b.enabled ? 'checked' : ''} onchange="toggleBot(${i})">
        <span class="slider"></span>
      </label>
    </div>
  `).join('');
}

function renderPhrases(groups) {
  const el = document.getElementById('phrase-list');
  el.innerHTML = Object.entries(groups).map(([group, phrases]) => `
    <div class="phrase-section">
      <div class="phrase-group-name">${group}</div>
      <div class="phrase-tags">
        ${phrases.map(p => `<button class="phrase-tag" onclick="sendPhrase('${group}')">${p}</button>`).join('')}
        <button class="add-tag" onclick="openModal('${group}')">+ фраза</button>
      </div>
    </div>
  `).join('') + `<div style="padding:8px 14px"><button class="add-tag" style="width:100%;text-align:center" onclick="openModal('')">+ новая группа</button></div>`;
}

async function toggleBot(i) {
  await fetch('/api/toggle-bot', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ botIndex: i }) });
}

async function sendPhrase(group) {
  const r = await fetch('/api/phrase', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ group }) });
  const d = await r.json();
  if (d.phrase) addChatMsg('bot', 'БОТ', d.phrase);
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const botIdx = parseInt(document.getElementById('bot-select').value) || 0;
  let text = inp.value.trim();
  if (!text) return;
  if (replyTo) text = `@${replyTo} ${text}`;
  await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ botIndex: botIdx, message: text }) });
  addChatMsg('bot', botList[botIdx]?.username || 'Бот', text);
  inp.value = '';
  clearReply();
}

function setReply(name) {
  replyTo = name;
  document.getElementById('reply-bar').classList.remove('hidden');
  document.getElementById('reply-label').textContent = `Ответ для @${name}`;
  document.getElementById('msg-inp').focus();
}

function clearReply() {
  replyTo = null;
  document.getElementById('reply-bar').classList.add('hidden');
}

function addChatMsg(type, name, text, actions) {
  const chat = document.getElementById('chat');
  const noTr = document.getElementById('no-transcript');
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'});
  const initials = name.slice(0,2).toUpperCase();
  const actionsHtml = actions ? `<div class="msg-actions"><button class="msg-btn" onclick="setReply('${name}')">↩ ответить</button></div>` : '';
  chat.insertAdjacentHTML('beforeend', `
    <div class="msg">
      <div class="msg-av ${type}">${initials}</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="msg-name ${type}">${name}</span><span class="msg-time">${time}</span></div>
        <div class="msg-text">${text}</div>
        ${actionsHtml}
      </div>
    </div>
  `);
  chat.scrollTop = chat.scrollHeight;
  msgCount++;
  document.getElementById('msg-count').textContent = msgCount + ' сообщений';
}

function addTranscript(text) {
  document.getElementById('no-transcript').style.display = 'none';
  const area = document.getElementById('transcript-area');
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  area.insertAdjacentHTML('afterbegin', `
    <div class="transcript-item">
      ${text}
      <div class="transcript-time">${time}</div>
    </div>
  `);
  // Оставляем только последние 20
  const items = area.querySelectorAll('.transcript-item');
  if (items.length > 20) items[items.length-1].remove();
}

function openModal(group) {
  pendingGroup = group;
  document.getElementById('modal-group').value = group;
  document.getElementById('modal-phrase').value = '';
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => (group ? document.getElementById('modal-phrase') : document.getElementById('modal-group')).focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function addPhrase() {
  const group = document.getElementById('modal-group').value.trim();
  const phrase = document.getElementById('modal-phrase').value.trim();
  if (!group || !phrase) return;
  await fetch('/api/phrases/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ group, phrase }) });
  closeModal();
}

// Socket events
socket.on('transcription', (data) => {
  addTranscript(data.text);
});

socket.on('bot-message', (data) => {
  addChatMsg('bot', 'Бот', data.message);
});

socket.on('bot-state', (data) => {
  loadStatus(); // перезагрузить список ботов
});

socket.on('phrases-updated', (groups) => {
  renderPhrases(groups);
});

// Init
loadStatus();
setInterval(loadStatus, 30000); // обновляем каждые 30 сек

// Примерные сообщения чата для наглядности
setTimeout(() => {
  addChatMsg('system', 'СИСТЕМА', 'Дашборд подключён к серверу ботов', false);
}, 500);
</script>
</body>
</html>
