<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Bot Dashboard</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --bg2: #18181b; --bg3: #1f1f23; --border: #2a2a2e;
    --text: #efeff1; --muted: #adadb8; --purple: #9147ff;
    --green: #00c853; --red: #e53935; --radius: 8px;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
  .layout { display: grid; grid-template-columns: 260px 1fr 280px; grid-template-rows: 48px 1fr; height: 100vh; }

  .topbar { grid-column: 1/-1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
  .logo { font-size: 15px; font-weight: 700; color: var(--purple); }
  .live-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; background: var(--bg3); color: var(--muted); }
  .live-badge.live { background: var(--red); color: white; }
  .channel-name { font-weight: 600; }
  .game-name { color: var(--muted); font-size: 13px; margin-left: auto; }
  .viewers { color: var(--muted); font-size: 13px; margin-left: 12px; }

  .left { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; }
  .panel-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 12px 14px 6px; }

  .bot-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
  .bot-av { width: 32px; height: 32px; border-radius: 50%; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .bot-av.off { background: var(--bg3); color: var(--muted); }
  .bot-info { flex: 1; min-width: 0; }
  .bot-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bot-st { font-size: 11px; color: var(--muted); }
  .bot-st.on { color: var(--green); }
  .toggle { position: relative; width: 34px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 18px; transition: .2s; }
  .slider::before { content: ''; position: absolute; height: 12px; width: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: .2s; }
  input:checked + .slider { background: var(--purple); }
  input:checked + .slider::before { transform: translateX(16px); }

  .phrase-section { padding: 8px 14px 12px; border-bottom: 1px solid var(--border); }
  .phrase-group-btn { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; width: 100%; text-align: left; }
  .phrase-group-btn:hover { color: var(--purple); }
  .phrase-group-btn::after { content: '▸'; font-size: 10px; opacity: 0.5; }
  .phrase-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  /* Конкретная фраза — нажимаем точно эту */
  .phrase-tag { font-size: 12px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text); transition: all .15s; white-space: nowrap; }
  .phrase-tag:hover { background: var(--purple); border-color: var(--purple); color: white; }
  .add-tag { font-size: 12px; padding: 4px 10px; background: transparent; border: 1px dashed var(--border); border-radius: 20px; cursor: pointer; color: var(--muted); }
  .add-tag:hover { border-color: var(--purple); color: var(--purple); }

  .center { display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); font-size: 12px; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 4px; }
  .chat-msgs::-webkit-scrollbar { width: 4px; }
  .chat-msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 8px; align-items: flex-start; padding: 4px 6px; border-radius: 6px; transition: background .1s; }
  .msg:hover { background: var(--bg3); }
  .msg-av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; margin-top: 1px; }
  .msg-av.bot { background: var(--purple); }
  .msg-av.user { background: #2a6b9c; }
  .msg-av.streamer { background: #b45309; }
  .msg-av.system { background: var(--bg3); color: var(--muted); }
  .msg-body { flex: 1; }
  .msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1px; }
  .msg-name { font-size: 12px; font-weight: 700; }
  .msg-name.bot { color: var(--purple); }
  .msg-name.user { color: #5ba3d9; }
  .msg-name.streamer { color: #f59e0b; }
  .msg-name.system { color: var(--muted); }
  .msg-time { font-size: 10px; color: var(--muted); }
  .msg-text { font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-word; }
  .msg-actions { margin-top: 3px; display: none; gap: 4px; }
  .msg:hover .msg-actions { display: flex; }
  .msg-btn { font-size: 11px; padding: 2px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--muted); }
  .msg-btn:hover { color: var(--text); border-color: var(--purple); }

  .send-area { border-top: 1px solid var(--border); padding: 10px 14px; background: var(--bg2); }
  .reply-bar { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: var(--bg3); border-left: 2px solid var(--purple); border-radius: 0 4px 4px 0; margin-bottom: 8px; font-size: 12px; color: var(--muted); }
  .reply-bar.hidden { display: none; }
  .reply-x { cursor: pointer; margin-left: auto; }
  .reply-x:hover { color: var(--text); }
  .send-row { display: flex; gap: 8px; }
  select.bot-pick { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 0 10px; font-size: 13px; cursor: pointer; flex-shrink: 0; height: 36px; }
  .msg-inp { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 0 12px; font-size: 13px; height: 36px; outline: none; }
  .msg-inp:focus { border-color: var(--purple); }
  .send-btn { background: var(--purple); border: none; border-radius: var(--radius); color: white; padding: 0 18px; font-size: 13px; font-weight: 600; cursor: pointer; height: 36px; }
  .send-btn:hover { background: #7c3bda; }

  .right { background: var(--bg2); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .transcript-area { padding: 8px 14px; flex: 1; }
  .tr-item { padding: 8px 10px; background: var(--bg3); border-radius: var(--radius); margin-bottom: 6px; font-size: 12px; line-height: 1.5; border-left: 2px solid var(--purple); }
  .tr-time { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .no-tr { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 14px; line-height: 1.6; }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.hidden { display: none; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; width: 320px; }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .modal input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 12px; font-size: 13px; margin-bottom: 8px; outline: none; }
  .modal input:focus { border-color: var(--purple); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .mbtn { padding: 7px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
  .mbtn.cancel { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .mbtn.ok { background: var(--purple); color: white; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
  .msg { animation: fadeIn .15s ease; }
</style>
</head>
<body>
<div class="layout">

  <div class="topbar">
    <span class="logo">⬡ BOT DASHBOARD</span>
    <span class="live-badge" id="live-badge">ОФЛАЙН</span>
    <span class="channel-name" id="ch-name">загрузка...</span>
    <span class="game-name" id="game-name"></span>
    <span class="viewers" id="viewers"></span>
  </div>

  <div class="left">
    <div class="panel-title">Боты</div>
    <div id="bot-list"></div>
    <div class="panel-title" style="margin-top:8px">Быстрые фразы</div>
    <div id="phrase-list"></div>
    <div style="padding:8px 14px 14px">
      <button class="add-tag" style="width:100%;text-align:center;padding:7px" onclick="openModal('')">+ новая группа</button>
    </div>
  </div>

  <div class="center">
    <div class="chat-header">
      ЧАТ
      <span style="color:var(--muted);font-weight:400;margin-left:auto;font-size:12px" id="msg-count">0 сообщений</span>
    </div>
    <div class="chat-msgs" id="chat"></div>
    <div class="send-area">
      <div class="reply-bar hidden" id="reply-bar">
        <span id="reply-label">Ответ для @...</span>
        <span class="reply-x" onclick="clearReply()">✕</span>
      </div>
      <div class="send-row">
        <select class="bot-pick" id="bot-sel"></select>
        <input class="msg-inp" id="msg-inp" placeholder="Написать от имени бота..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">Отправить</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="panel-title" style="padding:12px 14px 6px">Транскрипция</div>
    <div class="transcript-area" id="tr-area">
      <div class="no-tr" id="no-tr">Ожидание речи...<br><small style="opacity:.5;font-size:11px">Появится когда начнёшь говорить на стриме</small></div>
    </div>
  </div>
</div>

<div class="modal-bg hidden" id="modal">
  <div class="modal">
    <h3>Добавить фразу</h3>
    <input id="m-group" placeholder="Группа (напр: Приветствия)" />
    <input id="m-phrase" placeholder="Текст фразы" onkeydown="if(event.key==='Enter')addPhrase()" />
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Отмена</button>
      <button class="mbtn ok" onclick="addPhrase()">Добавить</button>
    </div>
  </div>
</div>

<script>
const socket = io();
let replyTo = null;
let botList = [];
let msgCount = 0;

async function loadStatus() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    renderBots(d.bots);
    renderPhrases(d.phraseGroups);
    updateHeader(d.channelInfo, d.channel);
    const sel = document.getElementById('bot-sel');
    sel.innerHTML = d.bots.map((b, i) => `<option value="${i}">${b.username}</option>`).join('');
    botList = d.bots;
  } catch(e) { console.error(e); }
}

function updateHeader(info, channel) {
  const name = channel?.includes('twitch.tv/') ? channel.split('twitch.tv/')[1].split('/')[0] : channel || '';
  document.getElementById('ch-name').textContent = name;
  if (!info) return;
  document.getElementById('game-name').textContent = info.gameName && info.gameName !== 'Not specified' ? '🎮 ' + info.gameName : '';
  document.getElementById('viewers').textContent = info.viewerCount ? '👁 ' + info.viewerCount : '';
  const badge = document.getElementById('live-badge');
  if (info.isLive) { badge.textContent = 'LIVE'; badge.classList.add('live'); }
}

function renderBots(bots) {
  document.getElementById('bot-list').innerHTML = bots.map((b, i) => `
    <div class="bot-item">
      <div class="bot-av ${b.enabled ? '' : 'off'}" id="av-${i}">${b.username.slice(0,2).toUpperCase()}</div>
      <div class="bot-info">
        <div class="bot-name">${b.username}</div>
        <div class="bot-st ${b.connected && b.enabled ? 'on' : ''}" id="bst-${i}">${b.connected && b.enabled ? 'онлайн' : 'выключен'}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" ${b.enabled ? 'checked' : ''} onchange="toggleBot(${i})">
        <span class="slider"></span>
      </label>
    </div>
  `).join('');
}

function renderPhrases(groups) {
  document.getElementById('phrase-list').innerHTML = Object.entries(groups).map(([group, phrases]) => `
    <div class="phrase-section">
      <button class="phrase-group-btn" onclick="sendRandom('${group}')" title="Отправить случайную из группы">${group}</button>
      <div class="phrase-tags">
        ${phrases.map(p => `<button class="phrase-tag" onclick="sendExact(${JSON.stringify(p)})">${p}</button>`).join('')}
        <button class="add-tag" onclick="openModal('${group}')">+ фраза</button>
      </div>
    </div>
  `).join('');
}

// Название группы → случайная фраза
async function sendRandom(group) {
  await fetch('/api/phrase/random', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ group }) });
}

// Конкретная фраза → отправить именно её
async function sendExact(phrase) {
  await fetch('/api/phrase/exact', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ phrase }) });
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const botIdx = parseInt(document.getElementById('bot-sel').value) || 0;
  let text = inp.value.trim();
  if (!text) return;
  if (replyTo) text = `@${replyTo} ${text}`;
  inp.value = '';
  clearReply();
  await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ botIndex: botIdx, message: text }) });
  // НЕ добавляем вручную — придёт через socket 'bot-sent'
}

async function toggleBot(i) {
  await fetch('/api/toggle-bot', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ botIndex: i }) });
  setTimeout(loadStatus, 500);
}

function setReply(name) {
  replyTo = name;
  document.getElementById('reply-bar').classList.remove('hidden');
  document.getElementById('reply-label').textContent = `Ответ для @${name}`;
  document.getElementById('msg-inp').focus();
}

function clearReply() {
  replyTo = null;
  document.getElementById('reply-bar').classList.add('hidden');
}

function addMsg(type, name, text, canReply) {
  const chat = document.getElementById('chat');
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
  const init = name.slice(0,2).toUpperCase();
  const replyBtn = canReply ? `<button class="msg-btn" onclick="setReply('${name.replace(/'/g,"\\'")}')">↩ ответить</button>` : '';
  chat.insertAdjacentHTML('beforeend', `
    <div class="msg">
      <div class="msg-av ${type}">${init}</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="msg-name ${type}">${name}</span><span class="msg-time">${time}</span></div>
        <div class="msg-text">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        <div class="msg-actions">${replyBtn}</div>
      </div>
    </div>
  `);
  chat.scrollTop = chat.scrollHeight;
  document.getElementById('msg-count').textContent = (++msgCount) + ' сообщений';
}

function addTranscript(text) {
  document.getElementById('no-tr').style.display = 'none';
  const area = document.getElementById('tr-area');
  const time = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  area.insertAdjacentHTML('afterbegin', `<div class="tr-item">${text.replace(/</g,'&lt;')}<div class="tr-time">${time}</div></div>`);
  const items = area.querySelectorAll('.tr-item');
  if (items.length > 20) items[items.length-1].remove();
}

function openModal(group) {
  document.getElementById('m-group').value = group;
  document.getElementById('m-phrase').value = '';
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => (group ? document.getElementById('m-phrase') : document.getElementById('m-group')).focus(), 50);
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function addPhrase() {
  const group = document.getElementById('m-group').value.trim();
  const phrase = document.getElementById('m-phrase').value.trim();
  if (!group || !phrase) return;
  await fetch('/api/phrases/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ group, phrase }) });
  closeModal();
}

// === Socket события ===

// Бот написал сообщение (через AI или вручную/фразу)
socket.on('bot-sent', (d) => {
  const botName = botList[0]?.username || 'Бот';
  addMsg('bot', botName, d.message, false);
});

// Входящие сообщения от реальных зрителей и стримера
socket.on('incoming-chat', (d) => {
  const type = d.isStreamer ? 'streamer' : 'user';
  addMsg(type, d.username, d.message, true);
});

// Транскрипция речи
socket.on('transcription', (d) => addTranscript(d.text));

// Обновление фраз
socket.on('phrases-updated', (groups) => renderPhrases(groups));

// Состояние ботов
socket.on('bot-state', () => loadStatus());

// Инит
loadStatus();
setInterval(loadStatus, 30000);
setTimeout(() => addMsg('system', 'СИСТЕМА', 'Дашборд подключён к серверу ботов', false), 300);
</script>
</body>
</html>
